<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mua Credit — DES AUTO</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;margin:0;padding:24px 16px 48px;color:#1e293b}
    h1{text-align:center;font-size:28px;font-weight:700;margin:0 0 6px}
    .subtitle{text-align:center;color:#64748b;margin:0 0 40px;font-size:15px}
    .packages{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;max-width:960px;margin:0 auto}
    .card{background:white;border:1.5px solid #e2e8f0;border-radius:16px;padding:32px 28px;width:280px;position:relative;transition:box-shadow .2s,border-color .2s}
    .card:hover{box-shadow:0 8px 32px rgba(0,0,0,.10)}
    .card.popular{border-color:#6366f1;box-shadow:0 4px 20px rgba(99,102,241,.15)}
    .popular-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:#6366f1;color:white;font-size:12px;font-weight:600;padding:3px 14px;border-radius:999px;white-space:nowrap}
    .pkg-name{font-size:20px;font-weight:700;margin:0 0 4px}
    .pkg-price{font-size:32px;font-weight:800;color:#6366f1;margin:12px 0 4px}
    .pkg-price span{font-size:16px;font-weight:400;color:#94a3b8}
    .pkg-credits{color:#64748b;font-size:14px;margin:0 0 20px}
    .btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;background:#6366f1;color:white;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
    .btn:hover{background:#4f46e5}
    .btn:disabled{background:#c7d2fe;cursor:default}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .modal{background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:440px;text-align:center}
    .modal h2{margin:0 0 6px}
    .modal p{color:#64748b;margin:0 0 20px;font-size:14px}
    .form-group{text-align:left;margin-bottom:14px}
    .form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
    .form-group input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none}
    .form-group input:focus{border-color:#6366f1}
    .modal-actions{display:flex;gap:10px;margin-top:20px}
    .btn-cancel{flex:1;padding:11px;border:1.5px solid #e2e8f0;border-radius:10px;background:white;cursor:pointer;font-size:14px}
    .btn-pay{flex:2}
    .qr-box{margin:20px 0}
    .qr-box img{max-width:200px;border-radius:8px}
    .checkout-link{display:inline-block;margin-top:12px;padding:10px 24px;background:#6366f1;color:white;border-radius:8px;text-decoration:none;font-weight:600}
    .order-status{font-size:13px;color:#64748b;margin-top:12px}
    .key-result{font-size:20px;font-weight:700;letter-spacing:3px;background:#f0fdf4;border:1px solid #86efac;padding:12px 20px;border-radius:8px;margin:16px 0;word-break:break-all}
    .copy-btn{padding:8px 18px;border:1.5px solid #6366f1;border-radius:8px;background:white;color:#6366f1;cursor:pointer;font-size:13px;font-weight:500}
    .error{color:#dc2626;font-size:13px;margin:8px 0 0}
  </style>
</head>
<body>
<h1>🎨 Mua Credit — DES AUTO</h1>
<p class="subtitle">1 credit = xử lý 1 ảnh. Không giới hạn thời gian sử dụng.</p>
<div class="packages" id="packages"><p>Đang tải gói...</p></div>
<div class="overlay" id="overlay"><div class="modal" id="modal-content"></div></div>

<script>
let selectedPkg=null,pollingTimer=null;

async function loadPackages(){
  try{
    const res=await fetch('/packages');
    const pkgs=await res.json();
    renderPackages(pkgs);
  }catch(e){
    document.getElementById('packages').innerHTML='<p style="color:red">Không tải được gói. Vui lòng thử lại.</p>';
  }
}

function renderPackages(pkgs){
  const popularId=pkgs[1]?.id;
  document.getElementById('packages').innerHTML=pkgs.map(p=>`
    <div class="card ${p.id===popularId?'popular':''}">
      ${p.id===popularId?'<div class="popular-badge">⭐ Phổ biến</div>':''}
      <div class="pkg-name">${p.name}</div>
      <div class="pkg-price">${fmtVND(p.price_vnd)}<span>đ</span></div>
      <div class="pkg-credits">${p.credits} ảnh</div>
      <button class="btn" onclick='openBuyModal(${JSON.stringify(p)})'>Mua ngay</button>
    </div>`).join('');
}

function fmtVND(n){return n.toLocaleString('vi-VN')}

function openBuyModal(pkg){
  selectedPkg=pkg;
  document.getElementById('modal-content').innerHTML=`
    <h2>Mua gói ${pkg.name}</h2>
    <p>${pkg.credits} credit · ${fmtVND(pkg.price_vnd)}đ</p>
    <div class="form-group"><label>Email nhận key *</label><input type="email" id="buyer-email" placeholder="email@example.com"></div>
    <div class="form-group"><label>Tên của bạn</label><input type="text" id="buyer-name" placeholder="Nguyễn Văn A"></div>
    <div class="form-group"><label>Key hiện có (nếu muốn nạp thêm)</label><input type="text" id="existing-key" placeholder="DES-XXXX-XXXX-XXXX (bỏ trống = tạo key mới)"></div>
    <div id="form-error" class="error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-pay" onclick="submitOrder()">Thanh toán</button>
    </div>`;
  showModal();
}

async function submitOrder(){
  const email=document.getElementById('buyer-email').value.trim();
  const name=document.getElementById('buyer-name').value.trim();
  const existingKey=document.getElementById('existing-key').value.trim().toUpperCase();
  if(!email){document.getElementById('form-error').textContent='Vui lòng nhập email.';return;}
  const btn=document.querySelector('.btn-pay');
  btn.disabled=true;btn.textContent='Đang tạo đơn...';
  try{
    const res=await fetch('/payment/create',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({package_id:selectedPkg.id,buyer_email:email,buyer_name:name,existing_key:existingKey})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.detail||'Lỗi tạo đơn hàng');
    showQRModal(data);
  }catch(e){
    document.getElementById('form-error').textContent=e.message;
    btn.disabled=false;btn.textContent='Thanh toán';
  }
}

function showQRModal(order){
  document.getElementById('modal-content').innerHTML=`
    <h2>Quét QR để thanh toán</h2>
    <p>Đơn #${order.order_code} · ${fmtVND(order.amount)}đ · ${order.credits} credit</p>
    <div class="qr-box">
      <a href="${order.checkout_url}" target="_blank">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(order.checkout_url)}" alt="QR">
      </a>
    </div>
    <a class="checkout-link" href="${order.checkout_url}" target="_blank">Mở trang thanh toán →</a>
    <div class="order-status" id="poll-status">⏳ Đang chờ thanh toán...</div>`;
  showModal();
  startPolling(order.order_code);
}

function startPolling(code){
  if(pollingTimer)clearInterval(pollingTimer);
  pollingTimer=setInterval(()=>pollStatus(code),4000);
}

async function pollStatus(code){
  try{
    const res=await fetch(`/payment/status/${code}`);
    const data=await res.json();
    if(data.status==='paid'){clearInterval(pollingTimer);showSuccessModal(data);}
    else if(data.status==='failed'){clearInterval(pollingTimer);document.getElementById('poll-status').textContent='❌ Thanh toán thất bại.';}
  }catch(_){}
}

function showSuccessModal(data){
  document.getElementById('modal-content').innerHTML=`
    <h2 style="color:#16a34a">✅ Thanh toán thành công!</h2>
    <p>+${data.credits} credit đã được cấp</p>
    <div class="key-result" id="key-display">${data.license_key}</div>
    <button class="copy-btn" onclick="copyKey()">📋 Sao chép key</button>
    <p style="font-size:13px;color:#64748b;margin-top:16px">Mở app DES AUTO → Settings → nhập key để sử dụng.</p>
    <button class="btn" style="margin-top:8px" onclick="closeModal()">Đóng</button>`;
}

function copyKey(){
  navigator.clipboard.writeText(document.getElementById('key-display').textContent.trim())
    .then(()=>{document.querySelector('.copy-btn').textContent='✅ Đã sao chép!';});
}

function showModal(){document.getElementById('overlay').classList.add('show');}
function closeModal(){if(pollingTimer)clearInterval(pollingTimer);document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadPackages();
</script>
</body>
</html>
